<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Simple Div Calculator</title>
<style>
#calc {
    width: 300px;
    margin: 50px auto;
    padding: 15px;
    border: 2px solid black;
    border-radius: 10px;
    background-color: #f0f0f0;
}

#display {
    width: 100%;
    height: 50px;
    margin-bottom: 10px;
    text-align: right;
    font-size: 24px;
    border: 1px solid #000;
    padding-right: 10px;
}

.button {
    width: 60px;
    height: 50px;
    margin: 5px;
    background-color: lightgray;
    text-align: center;
    line-height: 50px;
    font-size: 20px;
    cursor: pointer;
    display: inline-block;
    border-radius: 5px;
}

.operator { background-color: orange; color: white; }
.equal { background-color: green; color: white; }
.clear { background-color: red; color: white; }

#buttons { text-align: center; }
</style>
</head>
<body>

<div id="calc">
    <div id="display">0</div>
    <div id="buttons"></div>
</div>

<script>
let display = document.getElementById('display')
let buttonsDiv = document.getElementById('buttons')

let currentInput = ''
let firstNumber = null
let operator = ''

let labels = ['7','8','9','/','4','5','6','*','1','2','3','-','0','.','=','+','C']

for(let i=0; i<labels.length; i++){
    let btn = document.createElement('div')
    btn.innerText = labels[i]
    btn.className = 'button'

    if(['+','-','*','/'].includes(labels[i])) btn.className += ' operator'
    else if(labels[i] === '=') btn.className += ' equal'
    else if(labels[i] === 'C') btn.className += ' clear'

    buttonsDiv.appendChild(btn)

    btn.addEventListener('click', function(){
        let val = labels[i]

        if(val === 'C'){
            currentInput = ''
            firstNumber = null
            operator = ''
            display.innerText = '0'
        } 
        else if(val === '='){
            if(operator && firstNumber !== null && currentInput !== ''){
                let secondNumber = parseFloat(currentInput)
                let result = 0
                if(operator === '+') result = firstNumber + secondNumber
                if(operator === '-') result = firstNumber - secondNumber
                if(operator === '*') result = firstNumber * secondNumber
                if(operator === '/') result = firstNumber / secondNumber

                display.innerText = result
                currentInput = '' + result
                operator = ''
                firstNumber = null
            }
        } 
        else if(['+','-','*','/'].includes(val)){
            if(currentInput !== ''){
                firstNumber = parseFloat(currentInput)
                operator = val
                currentInput = ''
            }
        } 
        else{
            currentInput += val
            display.innerText = currentInput
        }
    })
}
</script>

</body>
</html>
