<!DOCTYPE html>
<html lang="en">
<head>
    <title>Blood Group Validation</title>
</head>
<body>

<fieldset style="width: 150px;">

<label>Blood Group</label><br><br>

<select id="blood">
<option value="">Select Blood Group</option>
<option value="A+">A+</option>
<option value="AB+">AB+</option>
<option value="B+">B+</option>
<option value="O-">O-</option>
</select>

<hr width="150px" align="left">

<span id="message" style="color:red;"></span>

</fieldset><br>

<input type="button" value="Submit" id="submitBtn">


<script>

document.getElementById("submitBtn").addEventListener("click", validateBlood);

function validateBlood()
{
    var blood = document.getElementById("blood").value;

    if(blood == "")
    {
        document.getElementById("message").innerHTML = "Please select a blood group";
    }
    else
    {
        document.getElementById("message").innerHTML = "Blood Group is valid ✔";
    }
}

</script>

</body>
</html>
