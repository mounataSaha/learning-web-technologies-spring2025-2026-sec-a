<!DOCTYPE html>
<html lang="en">
<head>
    <title>Date of Birth Validation</title>
</head>
<body>

<fieldset style="width:200px;">
<legend>Date of Birth</legend>

Day: <input type="text" id="day" size="4"><br><br>
Month: <input type="text" id="month" size="4"><br><br>
Year: <input type="text" id="year" size="6"><br>

<hr width="150px" align="left">

<span id="message" style="color:red;"></span>

</fieldset><br>

<input type="button" value="Submit" id="submitBtn">


<script>

document.getElementById("submitBtn").addEventListener("click", validateDOB);

function validateDOB()
{
    var day = document.getElementById("day").value;
    var month = document.getElementById("month").value;
    var year = document.getElementById("year").value;

    
    if(day=="" || month=="" || year=="")
    {
        document.getElementById("message").innerHTML = "All fields are required";
    }

    
    else if(day<1 || day>31)
    {
        document.getElementById("message").innerHTML = "Day must be 1 to 31";
    }

    
    else if(month<1 || month>12)
    {
        document.getElementById("message").innerHTML = "Month must be 1 to 12";
    }

    
    else if(year<1990 || year>2016)
    {
        document.getElementById("message").innerHTML = "Year must be 1990 to 2016";
    }


    else
    {
        document.getElementById("message").innerHTML = "Valid Date ✔";
    }

}

</script>

</body>
</html>
