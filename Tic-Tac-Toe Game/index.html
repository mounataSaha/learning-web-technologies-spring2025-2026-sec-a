<!DOCTYPE html>
<html>
<head>
  <title>Tic Tac Toe</title>

  <style>
    body {
      text-align: center;
      font-family: Arial;
    }

    #board {
      width: 310px;
      margin: 20px auto;
    }

    .cell {
      width: 100px;
      height: 100px;
      float: left;
      border: 1px solid black;
      font-size: 30px;
      line-height: 100px;
      cursor: pointer;
    }

    .cell:hover {
      background-color: #eee;
    }

    .win {
      background-color: lightgreen;
    }

    #status {
      font-size: 20px;
      margin-top: 20px;
    }

    button {
      margin-top: 15px;
      padding: 8px 15px;
    }
  </style>
</head>

<body>

<h1>Tic Tac Toe</h1>

<div id="board">
  <div class="cell" onclick="play(0)"></div>
  <div class="cell" onclick="play(1)"></div>
  <div class="cell" onclick="play(2)"></div>

  <div class="cell" onclick="play(3)"></div>
  <div class="cell" onclick="play(4)"></div>
  <div class="cell" onclick="play(5)"></div>

  <div class="cell" onclick="play(6)"></div>
  <div class="cell" onclick="play(7)"></div>
  <div class="cell" onclick="play(8)"></div>
</div>

<div id="status">Player X turn</div>

<button onclick="resetGame()">Reset</button>

<script>

  let board = ["", "", "", "", "", "", "", "", ""];
  let player = "X";
  let gameOver = false;

  function play(index) {

    if (board[index] != "" || gameOver == true) {
      return;
    }

    board[index] = player;

    document.getElementsByClassName("cell")[index].innerHTML = player;

    checkWin();
  }

  function checkWin() {

    let win = [
      [0,1,2],
      [3,4,5],
      [6,7,8],
      [0,3,6],
      [1,4,7],
      [2,5,8],
      [0,4,8],
      [2,4,6]
    ];

    for (let i = 0; i < win.length; i++) {

      let a = win[i][0];
      let b = win[i][1];
      let c = win[i][2];

      if (board[a] != "" && board[a] == board[b] && board[b] == board[c]) {

        document.getElementsByClassName("cell")[a].classList.add("win");
        document.getElementsByClassName("cell")[b].classList.add("win");
        document.getElementsByClassName("cell")[c].classList.add("win");

        document.getElementById("status").innerHTML = "Player " + player + " wins!";
        gameOver = true;
        return;
      }
    }

    if (!board.includes("")) {
      document.getElementById("status").innerHTML = "It's a draw!";
      gameOver = true;
      return;
    }

    changePlayer();
  }

  function changePlayer() {
    if (player == "X") {
      player = "O";
    } else {
      player = "X";
    }

    document.getElementById("status").innerHTML = "Player " + player + " turn";
  }

  function resetGame() {

    board = ["", "", "", "", "", "", "", "", ""];
    player = "X";
    gameOver = false;

    let cells = document.getElementsByClassName("cell");

    for (let i = 0; i < cells.length; i++) {
      cells[i].innerHTML = "";
      cells[i].classList.remove("win");
    }

    document.getElementById("status").innerHTML = "Player X turn";
  }

</script>

</body>
</html>
